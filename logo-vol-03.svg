<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bagel+Fat+One&amp;family=Inter:wght@700&amp;display=swap');
      .wordmark { font-family: 'Bagel Fat One', 'Arial Black', sans-serif; font-weight: 400; font-size: 68px; letter-spacing: -0.5px; }
      .ink      { fill: #1a2e1e; }
      .tomato   { fill: #c14a2c; }
      .vol      { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 3.5px; fill: #1a2e1e; }
    </style>
  </defs>

  <text x="210" y="90" text-anchor="middle" class="wordmark ink">LET'S <tspan class="tomato">BATCH</tspan></text>

  <line x1="75"  y1="128" x2="165" y2="128" stroke="#1a2e1e" stroke-width="1.4"/>
  <text x="210" y="133" text-anchor="middle" class="vol">VOLUME 03</text>
  <line x1="255" y1="128" x2="345" y2="128" stroke="#1a2e1e" stroke-width="1.4"/>
</svg>
