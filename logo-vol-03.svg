  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&amp;family=Inter:wght@700&amp;display=swap');
      .wordmark { font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-size: 62px; fill: #1a2e1e; }
